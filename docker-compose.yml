services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: supportnest
      POSTGRES_PASSWORD: supportnest
      POSTGRES_DB: supportnest_development
    ports:
      - "5432:5432"
    volumes:
      - supportnest_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U supportnest -d supportnest_development"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    environment:
      RAILS_ENV: development
      SECRET_KEY_BASE: local-development-secret
      POSTGRES_HOST: db
      POSTGRES_USER: supportnest
      POSTGRES_PASSWORD: supportnest
      POSTGRES_DB: supportnest_development
      RATE_LIMIT_REQUESTS_PER_MINUTE: 120
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - bundle_cache:/usr/local/bundle
      - supportnest_storage:/app/storage

volumes:
  bundle_cache:
  supportnest_postgres:
  supportnest_storage:
