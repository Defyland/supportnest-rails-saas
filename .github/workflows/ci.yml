name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: test
      POSTGRES_HOST: 127.0.0.1
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_TEST_DB: supportnest_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: supportnest_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d supportnest_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Lint Ruby
        run: bin/rubocop

      - name: Security audit
        run: bundle exec bundler-audit check --update

      - name: Brakeman
        run: bundle exec brakeman --quiet --no-pager --exit-on-warn --exit-on-error

      - name: Run tests
        run: bin/rails test

      - name: Validate OpenAPI
        run: npx @redocly/cli@latest lint openapi.yaml

      - name: Validate Docker build
        run: docker build -t supportnest-ci .

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
